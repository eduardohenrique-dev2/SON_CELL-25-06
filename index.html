function exportJSONFile(obj, filename){
  const blob=new Blob([JSON.stringify(obj,null,2)],{type:'application/json'});
  triggerDownload(blob, filename);
}
function exportCSVFile(headers, rows, filename){
  const esc=(v)=>{ const s=String(v??''); return /[",\n;]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s; };
  const csv = [headers.map(esc).join(';'), ...rows.map(r=>r.map(esc).join(';'))].join('\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  triggerDownload(blob, filename);
}
function exportXLSXFile(headers, rows, filename, sheetName){
  if(!window.XLSX){ toast('Biblioteca de Excel não carregada.'); return; }
  const data=[headers, ...rows];
  const ws = XLSX.utils.aoa_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, sheetName||'Dados');
  XLSX.writeFile(wb, filename);
}
function exportPDFFile(title, headers, rows, filename){
  if(!window.jspdf){ toast('Biblioteca de PDF não carregada.'); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.setFontSize(15); doc.setTextColor(91,33,182); doc.text(title, 14, 16);
  doc.setFontSize(9); doc.setTextColor(120,120,120); doc.text('SON Cell — gerado em '+new Date().toLocaleDateString('pt-BR'), 14, 22);
  let y = 32; const colW = (190)/headers.length; const rowH=8;
  doc.setFontSize(9); doc.setTextColor(255,255,255); doc.setFillColor(91,33,182);
  doc.rect(14,y-5,182,rowH,'F');
  headers.forEach((h,i)=> doc.text(String(h).slice(0,22), 16+i*colW, y));
  y+=rowH; doc.setTextColor(40,40,40);
  rows.forEach((r,idx)=>{
    if(y>280){ doc.addPage(); y=20; }
    if(idx%2===0){ doc.setFillColor(248,247,252); doc.rect(14,y-5,182,rowH,'F'); }
    r.forEach((c,i)=> doc.text(String(c??'—').slice(0,26), 16+i*colW, y));
    y+=rowH;
  });
  doc.save(filename);
}
function triggerDownload(blob, filename){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=filename; document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 200);
}
function handleExport(format, datasetKey){
  let headers, rows, title;
  if(datasetKey==='todos_participantes'){
    headers=['Nome','Telefone','Bairro','Idade','Função','Ministério','Cargo','Tempo no SON','Tempo na Função','Status','WhatsApp','CAJ','Como conheceu'];
    rows = DB.participantes.map(p=>[p.nome,p.telefone,p.bairro||'—',calcIdade(p.dataNascimento)??'—',p.funcaoSON||'Participante',(p.areasAtuacao||[]).join(', ')||'—',p.cargo||'—',tempoEm(p.dataEntradaSON),tempoEm(p.dataInicioFuncao),STATUS_LIST.find(s=>s.key===p.status)?.label,p.noWhatsapp==='sim'?'Sim':'Não',p.caj||'—',p.comoConheceu||'—']);
    title='Todos os Participantes';
  } else {
    const d = getReportData(datasetKey);
    headers=d.headers; rows=d.rows; title=d.title;
  }
  const fname = title.toLowerCase().replace(/[^a-z0-9]+/g,'_');
  if(format==='csv') exportCSVFile(headers, rows, fname+'.csv');
  else if(format==='xlsx') exportXLSXFile(headers, rows, fname+'.xlsx', title.slice(0,28));
  else if(format==='pdf') exportPDFFile(title, headers, rows, fname+'.pdf');
  toast('Exportação gerada: '+title);
}
function downloadBackupCompleto(){
  exportJSONFile({ participantes:DB.participantes, eventos:DB.eventos, presencas:DB.presencas, exportadoEm:new Date().toISOString(), origem:'SON Cell' }, 'son_cell_backup_'+todayISO()+'.json');
  lastBackupAt = new Date().toISOString();
  window.storage.set('soncell:last_backup', lastBackupAt, false).catch(()=>{});
  toast('Backup completo baixado!');
  render();
}
function importBackupFile(){

  const input=document.getElementById('import-file');
  if(!input.files || !input.files[0]){ toast('Selecione um arquivo de backup primeiro.'); return; }
  const file=input.files[0];
  const reader=new FileReader();
  reader.onload = (e)=>{
    try{
      const data = JSON.parse(e.target.result);
      if(!data.participantes && !data.eventos && !data.presencas){ toast('Arquivo de backup inválido.'); return; }
      openConfirm('Restaurar backup?', 'Isso substituirá TODOS os dados atuais (participantes, eventos e presenças) pelos dados deste arquivo. Esta ação não pode ser desfeita.', ()=>{
        DB.participantes = data.participantes || [];
        DB.eventos = data.eventos || [];
        DB.presencas = data.presencas || [];
        persist('participantes'); persist('eventos'); persist('presencas');
        closeModal(); render();
        toast('Backup restaurado com sucesso!');
      });
    }catch(err){ toast('Erro ao ler o arquivo. Verifique se é um backup válido.'); }
  };
  reader.readAsText(file);
}

/* ============================================================
   BUSCA GLOBAL
============================================================ */
function globalSearch(term){
  const box=document.getElementById('search-results');
  if(!term){ box.style.display='none'; box.innerHTML=''; return; }
  const t=term.toLowerCase();
  const matches = DB.participantes.filter(p=>{
    return [p.nome,p.telefone,p.bairro,p.quemConvidou,STATUS_LIST.find(s=>s.key===p.status)?.label, (p.interesseServir||[]).join(' ')]
      .some(v=> v && String(v).toLowerCase().includes(t));
  }).slice(0,8);
  box.style.display='block';
  box.innerHTML = matches.length===0 ? `<div class="sr-empty">Nenhum participante encontrado para "${escapeHtml(term)}"</div>` :
    matches.map(p=>`<div class="sr-item" data-action="search-goto" data-id="${p.id}"><span class="nm">${escapeHtml(p.nome)}</span><span class="meta">${escapeHtml(p.telefone||'')} · ${STATUS_LIST.find(s=>s.key===p.status)?.label}</span></div>`).join('');
}

/* ============================================================
   MODAL / CONFIRM
============================================================ */
function openModal({title, body, foot}){
  document.getElementById('modal-box').innerHTML = `
    <div class="modal-head"><h2>${title}</h2><button class="close-x" data-action="close-modal">✕</button></div>
    <div class="modal-body">${body}</div>
    ${foot?`<div class="modal-foot">${foot}</div>`:''}
  `;
  document.getElementById('modal-root').style.display='block';
}
function closeModal(){ document.getElementById('modal-root').style.display='none'; document.getElementById('modal-box').innerHTML=''; }
function openConfirm(title, msg, onConfirm){
  openModal({ title, body:`<p style="font-size:13.5px;color:var(--text-soft);line-height:1.6">${msg}</p>`,
    foot:`<button class="btn btn-outline" data-action="close-modal">Cancelar</button><button class="btn btn-danger" id="confirm-btn">Confirmar</button>` });
  document.getElementById('confirm-btn').onclick = onConfirm;
}

/* ============================================================
   EVENTOS GLOBAIS (delegação)
============================================================ */
document.addEventListener('click', (e)=>{
  const el = e.target.closest('[data-action]');
  if(!el) return;
  const action = el.dataset.action;
  if(action==='nav') navigateTo(el.dataset.view);
  else if(action==='toggle-sidebar') document.getElementById('sidebar').classList.toggle('mobile-open');
  else if(action==='toggle-theme') toggleTheme();
  else if(action==='enter-system') enterSystem();
  else if(action==='open-participant-form') openParticipantForm(el.dataset.id||null);
  else if(action==='edit-participant') openParticipantForm(el.dataset.id);
  else if(action==='delete-participant') deleteParticipant(el.dataset.id);
  else if(action==='save-participant') saveParticipantFromForm();
  else if(action==='set-status') setParticipantStatus(el.dataset.id, el.dataset.status);
  else if(action==='toggle-presence') togglePresence(el.dataset.pid, el.dataset.eid);
  else if(action==='open-event-form') openEventForm(el.dataset.id||null);
  else if(action==='save-event') saveEventFromForm();
  else if(action==='delete-event') deleteEvent(el.dataset.id);
  else if(action==='export') handleExport(el.dataset.format, el.dataset.dataset);
  else if(action==='download-backup') downloadBackupCompleto();
  else if(action==='request-backup') requestBackupNow();
  else if(action==='continue-exit') continueExit();
  else if(action==='import-backup') importBackupFile();
  else if(action==='close-modal') closeModal();
  else if(action==='search-goto'){
    document.getElementById('search-results').style.display='none';
    document.getElementById('global-search').value='';
    navigateTo('participantes');
    setTimeout(()=>openParticipantForm(el.dataset.id), 50);
  }
});
document.getElementById('global-search').addEventListener('input', (e)=> globalSearch(e.target.value.trim()));
document.addEventListener('click', (e)=>{
  if(!e.target.closest('.search-wrap')) document.getElementById('search-results').style.display='none';
});

init();
